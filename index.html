<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snack Hoods | Stealth Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #0071e3; 
            --bg: #000000;
            --card-bg: #121212;
            --text: #f5f5f7;
            --secondary-text: #86868b;
            --radius: 28px; /* Extra rounded for premium feel */
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 8%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #1d1d1f;
        }

        .logo { font-weight: 600; font-size: 1.2rem; letter-spacing: -0.5px; cursor: pointer; }
        .cart-btn { cursor: pointer; background: var(--accent); color: white; border: none; padding: 10px 24px; border-radius: 40px; font-size: 0.9rem; font-weight: 500; }

        /* --- Main Storefront --- */
        .store-container { margin-top: 120px; padding: 40px 8%; text-align: center; }
        
        .hero-text { margin-bottom: 80px; animation: fadeIn 1.2s ease; }
        .hero-text h1 { font-size: 4rem; font-weight: 800; margin: 0; letter-spacing: -2px; }
        .hero-text p { color: var(--secondary-text); font-size: 1.6rem; margin-top: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }

        .product-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 60px 40px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 1px solid #1d1d1f;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:hover { transform: scale(1.02); background: #161617; border-color: var(--accent); }

        .badge { background: rgba(0, 113, 227, 0.1); color: var(--accent); padding: 6px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; margin-bottom: 20px; display: inline-block; align-self: center; }
        .discount-tag { color: #ff3b30; font-size: 1rem; font-weight: 600; margin-left: 8px; }

        .price-label { font-size: 1.8rem; font-weight: 600; margin: 15px 0; }
        .promo-text { color: #00ff88; font-size: 0.85rem; font-weight: 500; margin-top: 10px; }

        /* --- Full Page Overlay --- */
        .product-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; transform: translateY(100%);
            display: flex; flex-direction: column; padding: 100px 8%;
            overflow-y: auto; visibility: hidden;
        }

        .product-page.active { transform: translateY(0); visibility: visible; }

        .close-page { position: absolute; top: 40px; right: 8%; font-size: 1.5rem; cursor: pointer; color: var(--secondary-text); background: #1d1d1f; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        /* --- Image Slider --- */
        .slider-wrapper { position: relative; margin-bottom: 40px; }
        .slider {
            width: 100%; height: 450px; background: #0a0a0a; border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #1d1d1f; font-size: 1.2rem; color: #444;
        }
        .slider-nav { position: absolute; bottom: 20px; display: flex; gap: 10px; }
        .dot { width: 8px; height: 8px; background: #333; border-radius: 50%; cursor: pointer; }
        .dot.active { background: var(--accent); width: 24px; border-radius: 4px; }

        /* --- Purchase Controls --- */
        .purchase-flex { display: flex; flex-wrap: wrap; gap: 60px; align-items: flex-start; }
        .info-col { flex: 1; min-width: 300px; }
        
        .qty-controls { display: flex; align-items: center; gap: 24px; margin: 30px 0; background: #161617; padding: 10px; border-radius: 50px; width: fit-content; }
        .qty-btn { background: #2c2c2e; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .qty-btn:hover { background: var(--accent); }
        
        .buy-now { background: var(--accent); color: white; border: none; width: 100%; max-width: 400px; padding: 22px; border-radius: 18px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="closeProduct()">SNACK HOODS</div>
        <button class="cart-btn">Bag</button>
    </nav>

    <div class="store-container">
        <div class="hero-text">
            <h1>Stealth Series</h1>
            <p>Enjoy life to the fullest.</p>
        </div>

        <div class="grid">
            <div class="product-card" onclick="openProduct('Lite', 'Coming Soon', 49.99)">
                <span class="badge">Limited Release</span>
                <h3>Snack-Hood Lite</h3>
                <div class="price-label" style="color: var(--secondary-text); font-style: italic;">Coming Soon</div>
            </div>

            <div class="product-card" onclick="openProduct('Classic', '139.99', 139.99)">
                <span class="badge">Essential</span>
                <h3>Snack-Hood Classic</h3>
                <div class="price-label">$139.99 <span class="discount-tag">-25%</span></div>
                <div class="promo-text">25% off for this purchase and 10% off for the next</div>
            </div>

            <div class="product-card" onclick="openProduct('Ultimate', '194.99', 194.99)">
                <span class="badge">Professional</span>
                <h3>Snack-Hood Ultimate</h3>
                <div class="price-label">$194.99</div>
            </div>
        </div>
    </div>

    <div id="productPage" class="product-page">
        <span class="close-page" onclick="closeProduct()">✕</span>
        
        <div class="purchase-flex">
            <div style="flex: 1.2; min-width: 320px;">
                <div class="slider-wrapper">
                    <div id="imgSlider" class="slider">
                        <span id="slideText">View Angle 1</span>
                    </div>
                    <div class="slider-nav">
                        <div class="dot active" onclick="setSlide(1)"></div>
                        <div class="dot" onclick="setSlide(2)"></div>
                        <div class="dot" onclick="setSlide(3)"></div>
                    </div>
                </div>
            </div>

            <div class="info-col">
                <h1 id="pName" style="font-size: 3.5rem; font-weight: 800; margin: 0; letter-spacing: -1.5px;"></h1>
                <p id="pDesc" style="color: var(--secondary-text); font-size: 1.2rem; margin: 20px 0 40px 0;"></p>
                
                <div class="price-label" id="pPrice" style="font-size: 2.5rem; margin-bottom: 40px;"></div>
                
                <div id="buyingSection">
                    <p style="font-weight: 600; font-size: 0.9rem; text-transform: uppercase; color: var(--secondary-text);">Quantity</p>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty(-1)">-</button>
                        <span id="pQty" style="font-size: 1.4rem; font-weight: 600; min-width: 30px; text-align: center;">1</span>
                        <button class="qty-btn" onclick="updateQty(1)">+</button>
                    </div>
                    <button class="buy-now" onclick="alert('Item reserved.')">Add to Bag</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPrice = 0;
        let currentQty = 1;
        let currentSlide = 1;

        function setSlide(n) {
            currentSlide = n;
            document.getElementById('slideText').innerText = `View Angle ${n}`;
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index + 1 === n);
            });
        }

        function openProduct(name, displayPrice, actualValue) {
            document.getElementById('pName').innerText = name;
            
            // Set Description based on model
            const descriptions = {
                'Lite': 'Engineered for breathability. High-efficiency storage in a lightweight frame.',
                'Classic': 'The standard-setting hoodie. Re-imagined for everyday stealth.',
                'Ultimate': 'Our most advanced system. Maximum insulation with triple-reinforced bays.'
            };
            document.getElementById('pDesc').innerText = descriptions[name];

            // Setup Price Display
            if (name === 'Lite') {
                document.getElementById('pPrice').innerHTML = `<span style="color:var(--secondary-text)">Coming Soon</span> <br> <span style="font-size:1.5rem">$49.99</span>`;
                document.getElementById('buyingSection').style.display = 'none';
                document.querySelector('.slider-wrapper').style.display = 'none';
            } else {
                let suffix = (name === 'Classic') ? ' <span class="discount-tag" style="font-size:1.5rem">-25%</span>' : '';
                document.getElementById('pPrice').innerHTML = "$" + displayPrice + suffix;
                document.getElementById('buyingSection').style.display = 'block';
                document.querySelector('.slider-wrapper').style.display = 'block';
            }
            
            currentPrice = actualValue;
            currentQty = 1;
            setSlide(1);
            document.getElementById('pQty').innerText = currentQty;

            document.getElementById('productPage').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeProduct() {
            document.getElementById('productPage').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function updateQty(val) {
            if (currentQty + val < 1) return;
            currentQty += val;
            document.getElementById('pQty').innerText = currentQty;
            const newTotal = (currentQty * currentPrice).toFixed(2);
            // We keep the original display style for the price
            const isClassic = document.getElementById('pName').innerText === 'Classic';
            let suffix = isClassic ? ' <span class="discount-tag" style="font-size:1.5rem">-25%</span>' : '';
            document.getElementById('pPrice').innerHTML = "$" + newTotal + suffix;
        }
    </script>
</body>
</html>
