<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snack-Hood | Experience Silence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-main: #FF385C; 
            --brand-alt: #00D1FF;  
            --brand-bright: #FFD600; 
            --eco-green: #2ecc71;
            --brand-orange: #ff7e5f; /* New Orange for background */
            --lumia-purple: #8e44ad;
            --bg-clean: #ffffff;
            --text-dark: #1A1A1B;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            background-color: var(--bg-clean);
            color: var(--text-dark);
            overflow-x: hidden;
            position: relative;
        }

        /* --- Apple-Style Animated Background --- */
        .bg-gradient-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(45deg, #ffffff, #f0f0f0);
        }

        .bg-blob {
            position: fixed;
            width: 800px;
            height: 800px;
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob-orange { background: var(--brand-orange); top: -200px; right: -200px; }
        .blob-green { background: var(--eco-green); bottom: -200px; left: -200px; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        /* Fluid Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.4s ease;
        }

        .logo { font-weight: 800; font-size: 1.8rem; color: var(--brand-main); cursor: pointer; }

        /* Video Hero Section */
        .hero-container {
            position: relative;
            height: 90vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: brightness(0.6) saturate(1.2);
            object-fit: cover;
        }

        .hero-content h1 { 
            font-size: clamp(3rem, 8vw, 6rem); 
            line-height: 0.9; 
            margin: 0;
            transform: translateY(30px);
            opacity: 0;
            animation: appleFade 1s forwards ease-out;
        }

        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes appleFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Product Cards */
        .card-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 40px; 
            padding: 100px 8%;
        }

        .p-card {
            background: rgba(253, 253, 253, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .p-card:hover {
            transform: scale(1.02) translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }

        .p-card video {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        /* --- Quantity Logic --- */
        .purchase-controls {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-top: 20px;
        }

        .qty-selector {
            display: flex;
            align-items: center;
            background: #f0f0f0;
            border-radius: 100px;
            width: fit-content;
            padding: 5px;
        }

        .qty-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: white;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .qty-btn:hover { background: var(--brand-alt); color: white; }

        .qty-val {
            padding: 0 15px;
            font-weight: 500;
        }

        .lite-version { background: #111; color: white; border: none; }

        .tag {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(0,0,0,0.05);
            margin-right: 5px;
            margin-bottom: 10px;
        }

        .page { display: none; }
        .page.active { display: block; }

        .btn-fluid {
            padding: 15px 30px;
            border-radius: 100px;
            border: none;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            background: var(--brand-main);
            color: white;
            width: 100%;
        }

        .btn-fluid:hover { transform: scale(1.03); filter: brightness(1.1); }
        .nav-links a { text-decoration: none; color: inherit; margin-left: 20px; font-weight: 500;}

    </style>
</head>
<body>

<div class="bg-gradient-mesh"></div>
<div class="bg-blob blob-orange"></div>
<div class="bg-blob blob-green"></div>

<nav>
    <div class="logo" onclick="showPage('home')">SNACK-HOOD</div>
    <div class="nav-links">
        <a href="#" onclick="showPage('shop')">Collection</a>
        <a href="#" onclick="showPage('cart')">Bag (<span id="cart-count">0</span>)</a>
    </div>
</nav>

<div id="home" class="page active">
    <div class="hero-container">
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-cinematic-video-of-a-man-in-a-hoodie-walking-34289-large.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h1>UNSAVABLE <br>PROGRESS.</h1>
            <p>15 Seconds to Load. 15 Seconds to Snack.</p>
            <button class="btn-fluid" style="width: auto;" onclick="showPage('shop')">Explore Collections</button>
        </div>
    </div>
</div>

<div id="shop" class="page">
    <div class="card-grid">
        <div class="p-card reveal">
            <video autoplay muted loop playsinline>
                <source src="https://assets.mixkit.co/videos/preview/mixkit-waves-in-the-water-1164-large.mp4" type="video/mp4">
            </video>
            <div class="tags">
                <div class="tag">🌿 ECOLIFE</div> <div class="tag">🔊 Lumia Labs</div>
            </div>
            <h3>Snack-Hood: The OG</h3>
            <p>$100.00 CAD</p>
            
            <div class="purchase-controls">
                <div class="qty-selector">
                    <button class="qty-btn" onclick="updateQty('og-qty', -1)">-</button>
                    <span class="qty-val" id="og-qty">1</span>
                    <button class="qty-btn" onclick="updateQty('og-qty', 1)">+</button>
                </div>
                <button class="btn-fluid" onclick="addToBag('Snack-Hood OG', 100, 'og-qty')">Add to Bag</button>
            </div>
        </div>

        <div class="p-card reveal">
            <video autoplay muted loop playsinline>
                <source src="https://assets.mixkit.co/videos/preview/mixkit-texture-of-a-black-fabric-4458-large.mp4" type="video/mp4">
            </video>
            <div class="tags">
                <div class="tag">🌿 Premium</div> <div class="tag">🔊 Lumia Max</div>
            </div>
            <h3>Snack-Hood Ultimate</h3>
            <p>$130.00 CAD</p>
            
            <div class="purchase-controls">
                <div class="qty-selector">
                    <button class="qty-btn" onclick="updateQty('ult-qty', -1)">-</button>
                    <span class="qty-val" id="ult-qty">1</span>
                    <button class="qty-btn" onclick="updateQty('ult-qty', 1)">+</button>
                </div>
                <button class="btn-fluid" onclick="addToBag('Snack-Hood Ultimate', 130, 'ult-qty')">Add to Bag</button>
            </div>
        </div>
    </div>
</div>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo({top: 0, behavior: 'smooth'});
        initScrollReveal();
    }

    function initScrollReveal() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    window.onload = initScrollReveal;

    // --- New Logic: Quantity and Cart ---
    function updateQty(id, delta) {
        const el = document.getElementById(id);
        let current = parseInt(el.innerText);
        current += delta;
        if (current < 1) current = 1; // Minimum 1
        el.innerText = current;
    }

    let cartCount = 0;
    function addToBag(name, price, qtyId) {
        const qty = parseInt(document.getElementById(qtyId).innerText);
        cartCount += qty;
        document.getElementById('cart-count').innerText = cartCount;
        
        // Visual feedback
        alert(`Successfully added ${qty}x ${name} to your bag!`);
        
        // Reset quantity back to 1 after adding
        document.getElementById(qtyId).innerText = "1";
    }
</script>

</body>
</html>
