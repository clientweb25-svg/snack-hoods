<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snack Hoods | Stealth Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #0071e3; /* Apple-style Blue */
            --bg: #000000;
            --card-bg: #121212;
            --text: #f5f5f7;
            --secondary-text: #86868b;
            --radius: 22px;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 8%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo { font-weight: 600; font-size: 1.2rem; letter-spacing: -0.5px; cursor: pointer; }
        .cart-btn { cursor: pointer; background: var(--accent); color: white; border: none; padding: 8px 20px; border-radius: 40px; font-size: 0.9rem; font-weight: 500; }

        /* --- Main Storefront --- */
        .store-container { margin-top: 100px; padding: 40px 8%; text-align: center; }
        
        .hero-text { margin-bottom: 60px; animation: fadeIn 1s ease; }
        .hero-text h1 { font-size: 3.5rem; font-weight: 800; margin: 0; }
        .hero-text p { color: var(--secondary-text); font-size: 1.5rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }

        .product-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 40px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 1px solid #1d1d1f;
        }

        .product-card:hover { transform: scale(1.02); border-color: var(--accent); }

        .badge { background: #1d1d1f; color: var(--accent); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-bottom: 20px; display: inline-block; }
        .discount-tag { color: #ff3b30; font-size: 0.9rem; font-weight: 600; margin-left: 10px; }

        .price { font-size: 1.8rem; font-weight: 600; margin: 20px 0; }
        .coming-soon { color: var(--secondary-text); font-style: italic; }

        /* --- Product Page Overlay --- */
        .product-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; transform: translateY(100%);
            display: flex; flex-direction: column; padding: 80px 8%;
            overflow-y: auto;
        }

        .product-page.active { transform: translateY(0); }

        .close-page { position: absolute; top: 40px; right: 8%; font-size: 2rem; cursor: pointer; color: var(--secondary-text); }

        /* --- Image Slider Placeholder --- */
        .slider {
            width: 100%; height: 400px; background: #111; border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 40px; border: 1px solid #222; position: relative;
        }
        .slider::after { content: 'Swipe for Angles ⟷'; color: #444; font-size: 0.8rem; position: absolute; bottom: 20px; }

        .qty-controls { display: flex; align-items: center; gap: 20px; margin: 30px 0; }
        .qty-btn { background: #1d1d1f; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
        
        .buy-now { background: var(--accent); color: white; border: none; width: 100%; padding: 20px; border-radius: 15px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="closeProduct()">SNACK HOODS</div>
        <button class="cart-btn">Bag</button>
    </nav>

    <div class="store-container">
        <div class="hero-text">
            <h1>Stealth Series</h1>
            <p>Enjoy life to the fullest.</p>
        </div>

        <div class="grid">
            <div class="product-card" onclick="openProduct('Lite', 'Coming Soon', '49.99', false)">
                <span class="badge">New Arrival</span>
                <h3>Snack-Hood Lite</h3>
                <p class="coming-soon">(Coming Soon)</p>
            </div>

            <div class="product-card" onclick="openProduct('Classic', '139.99', '139.99', true)">
                <span class="badge">Most Popular</span>
                <h3>Snack-Hood Classic</h3>
                <div class="price">$139.99 <span class="discount-tag">-25%</span></div>
                <p style="color: #00ff88; font-size: 0.8rem;">25% off today | 10% off next purchase</p>
            </div>

            <div class="product-card" onclick="openProduct('Ultimate', '194.99', '194.99', true)">
                <span class="badge">Pro Series</span>
                <h3>Snack-Hood Ultimate</h3>
                <div class="price">$194.99</div>
            </div>
        </div>
    </div>

    <div id="productPage" class="product-page">
        <span class="close-page" onclick="closeProduct()">✕</span>
        <h1 id="pName" style="font-size: 3rem; margin-bottom: 10px;"></h1>
        <p id="pStatus" style="font-size: 1.2rem; color: var(--secondary-text); margin-bottom: 40px;"></p>

        <div id="imgSlider" class="slider">
            [ Premium Image Slider Placeholder ]
        </div>

        <div id="buyingSection">
            <div class="price" id="pPrice" style="font-size: 2.5rem;"></div>
            
            <div class="qty-controls">
                <button class="qty-btn" onclick="updateQty(-1)">-</button>
                <span id="pQty" style="font-size: 1.5rem; font-weight: 600;">1</span>
                <button class="qty-btn" onclick="updateQty(1)">+</button>
            </div>

            <button class="buy-now" onclick="alert('Added to bag')">Add to Bag</button>
        </div>
    </div>

    <script>
        let currentPrice = 0;
        let currentQty = 1;

        function openProduct(name, displayPrice, actualValue, hasSlider) {
            document.getElementById('pName').innerText = name;
            document.getElementById('pStatus').innerText = (name === 'Lite') ? "Precision engineered for light snacking." : "Professional grade stealth apparel.";
            document.getElementById('pPrice').innerText = (name === 'Lite') ? "Coming Soon ($49.99)" : "$" + displayPrice;
            
            currentPrice = parseFloat(actualValue);
            currentQty = 1;
            document.getElementById('pQty').innerText = currentQty;

            // Handle UI for "Coming Soon"
            document.getElementById('buyingSection').style.opacity = (name === 'Lite') ? "0.3" : "1";
            document.getElementById('imgSlider').style.display = (name === 'Lite') ? "none" : "flex";

            document.getElementById('productPage').classList.add('active');
            document.body.style.overflow = 'hidden'; // Stop scrolling background
        }

        function closeProduct() {
            document.getElementById('productPage').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function updateQty(val) {
            if (currentQty + val < 1) return;
            currentQty += val;
            document.getElementById('pQty').innerText = currentQty;
            const newTotal = (currentQty * currentPrice).toFixed(2);
            document.getElementById('pPrice').innerText = "$" + newTotal;
        }
    </script>
</body>
</html>
