<!<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snack-Hoods | Stealth Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #0071e3; 
            --bg: #000000;
            --card-bg: #121212;
            --text: #f5f5f7;
            --secondary-text: #86868b;
            --radius: 30px;
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* --- High-End Animations --- */
        @keyframes reveal { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        /* --- Navigation --- */
        nav {
            display: flex; justify-content: space-between; padding: 15px 8%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(25px);
            position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-weight: 600; font-size: 1.1rem; letter-spacing: -0.5px; cursor: pointer; }
        .cart-btn { cursor: pointer; background: var(--accent); color: white; border: none; padding: 10px 25px; border-radius: 50px; font-weight: 500; font-size: 0.85rem; }

        /* --- Storefront --- */
        .store-container { margin-top: 140px; padding: 0 8% 100px; text-align: center; }
        .hero-text h1 { font-size: 4.5rem; font-weight: 800; margin: 0; letter-spacing: -3px; animation: reveal 1s ease; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin-top: 60px; }
        
        .product-card {
            background: var(--card-bg); border-radius: var(--radius); padding: 50px 30px;
            cursor: pointer; border: 1px solid #1d1d1f; animation: reveal 1s ease backwards;
        }
        .product-card:hover { transform: translateY(-10px); border-color: var(--accent); }

        /* --- Overlays --- */
        .full-page {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            transform: translateY(100%); padding: 100px 8%; overflow-y: auto; 
            visibility: hidden; transition: transform 0.6s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .full-page.active { transform: translateY(0); visibility: visible; }
        .close-btn { position: absolute; top: 40px; right: 8%; cursor: pointer; background: #2c2c2e; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2001; }

        /* --- Image Viewer --- */
        .img-container {
            width: 100%; height: 500px; background: #0a0a0a; border-radius: var(--radius);
            border: 1px solid #1d1d1f; overflow: hidden; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .img-gloss { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%); pointer-events: none; }

        /* --- Pickers --- */
        .picker-label { font-size: 0.7rem; font-weight: 800; color: var(--secondary-text); text-transform: uppercase; margin-top: 25px; display: block; }
        .color-row { display: flex; gap: 12px; margin: 10px 0 20px; }
        .dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transform: scale(0.9); }
        .dot.selected { border-color: var(--accent); transform: scale(1.1); }

        .size-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .s-btn { background: #1c1c1e; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .s-btn.selected { background: var(--accent); border-color: var(--accent); }

        .qty-pill {
            display: inline-flex; align-items: center; background: #1c1c1e; 
            border-radius: 50px; padding: 5px; border: 1px solid #333; margin: 25px 0;
        }
        .qty-pill button { background: #3a3a3c; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
        .qty-pill span { padding: 0 15px; font-weight: 600; min-width: 45px; text-align: center; }
        
        .add-btn { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 1.1rem; font-weight: 700; cursor: pointer; width: 100%; }
        .add-btn:hover { filter: brightness(1.1); transform: scale(1.02); }

    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="location.reload()">SNACK-HOODS</div>
        <button class="cart-btn" onclick="togglePage('cartPage')">Bag (<span id="cartCount">0</span>)</button>
    </nav>

    <div class="store-container">
        <div class="hero-text">
            <h1>Stealth Series</h1>
            <p style="color:var(--secondary-text); font-size:1.5rem">Enjoy life to the fullest.</p>
        </div>

        <div class="grid">
            <div class="product-card" onclick="openProduct('Lite')">
                <span style="color:var(--accent); font-size:0.7rem; font-weight:800;">NEOMAG™ MINUS</span>
                <h3>Snack-Hoods Lite</h3>
                <p>$49.99</p>
            </div>
            <div class="product-card" onclick="openProduct('Classic')">
                <span style="color:var(--accent); font-size:0.7rem; font-weight:800;">ESSENTIAL</span>
                <h3>Snack-Hoods Classic</h3>
                <p>$139.99 <span style="color:#ff3b30">-25%</span></p>
            </div>
            <div class="product-card" onclick="openProduct('Ultimate')">
                <span style="color:var(--accent); font-size:0.7rem; font-weight:800;">PRO WEAR</span>
                <h3>Snack-Hoods Ultimate</h3>
                <p>$194.99</p>
            </div>
        </div>
    </div>

    <div id="productPage" class="full-page">
        <div class="close-btn" onclick="togglePage('productPage')">✕</div>
        <div style="display:flex; flex-wrap:wrap; gap:50px; text-align:left;">
            <div style="flex:1.2; min-width:320px;">
                <div class="img-container">
                    <div class="img-gloss"></div>
                    <img id="mainImg" src="20260318_133242_0_UTC_0.jpg">
                </div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button onclick="setImg('20260318_133242_0_UTC_0.jpg')" style="flex:1; height:80px; overflow:hidden; border-radius:10px; border:none; cursor:pointer;"><img src="20260318_133242_0_UTC_0.jpg" style="width:100%; height:100%; object-fit:cover;"></button>
                    <button onclick="setImg('20260318_132707_0_UTC_0.jpg')" style="flex:1; height:80px; overflow:hidden; border-radius:10px; border:none; cursor:pointer;"><img src="20260318_132707_0_UTC_0.jpg" style="width:100%; height:100%; object-fit:cover;"></button>
                    <button onclick="setImg('20260318_132359_0_UTC_0.jpg')" style="flex:1; height:80px; overflow:hidden; border-radius:10px; border:none; cursor:pointer;"><img src="20260318_132359_0_UTC_0.jpg" style="width:100%; height:100%; object-fit:cover;"></button>
                </div>
            </div>

            <div style="flex:1; min-width:300px;">
                <h1 id="pName" style="font-size:3.5rem; margin:0; letter-spacing:-2px;"></h1>
                <p id="pPrice" style="font-size:2rem; color:var(--accent); margin:10px 0;"></p>
                
                <div id="buySection">
                    <span class="picker-label">Color: <span id="colorName" style="color:white">Void</span></span>
                    <div class="color-row" id="colorOptions"></div>

                    <span class="picker-label">Select Size</span>
                    <div class="size-row" id="sizeOptions"></div>

                    <div class="qty-pill">
                        <button onclick="updateQty(-1)">−</button>
                        <span id="pQty">1</span>
                        <button onclick="updateQty(1)">+</button>
                    </div>
                    <button class="add-btn" onclick="addToBag()">Add to Bag</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cartPage" class="full-page">
        <div class="close-btn" onclick="togglePage('cartPage')">✕</div>
        <h1 style="font-size:3rem; text-align:left;">Bag</h1>
        <div id="bagItems" style="margin-top:30px; text-align:left;"></div>
        <div style="margin-top:50px; background:#111; padding:40px; border-radius:var(--radius); text-align:right;">
            <p>Subtotal: $<span id="subTotal">0.00</span></p>
            <p style="color:var(--secondary-text)">Tax (13%): $<span id="taxTotal">0.00</span></p>
            <h2 style="font-size:2.5rem; color:var(--accent)">Total: $<span id="grandTotal">0.00</span></h2>
            <button class="add-btn" style="max-width:300px">Checkout</button>
        </div>
    </div>

    <script>
        let bag = [];
        let cur = { name: '', price: 0, qty: 1, color: 'Void', size: 'M' };
        
        const colors = [
            {n: 'Void', h: '#000'}, {n: 'Frost', h: '#e2e2e2'}, {n: 'Magma', h: '#ff3b30'}, 
            {n: 'Cloud', h: '#f5f5f7'}, {n: 'Cream', h: '#f3e5ab'}, {n: 'Blush', h: '#ffb6c1'}
        ];

        function togglePage(id) {
            const p = document.getElementById(id);
            p.classList.toggle('active');
            document.body.style.overflow = p.classList.contains('active') ? 'hidden' : 'auto';
        }

        function setImg(src) { document.getElementById('mainImg').src = src; }

        function openProduct(name) {
            cur = { name: name, price: (name === 'Ultimate' ? 194.99 : 139.99), qty: 1, color: 'Void', size: 'M' };
            if(name === 'Lite') cur.price = 49.99;
            
            document.getElementById('pName').innerText = "Snack-Hoods " + name;
            document.getElementById('pPrice').innerText = name === 'Lite' ? "Coming Soon" : "$" + cur.price;
            setImg('20260318_133242_0_UTC_0.jpg');
            renderSelectors();
            togglePage('productPage');
        }

        function renderSelectors() {
            // Colors
            document.getElementById('colorOptions').innerHTML = colors.map(c => `
                <div class="dot ${cur.color === c.n ? 'selected' : ''}" 
                     style="background:${c.h}" 
                     onclick="selectColor('${c.n}')"></div>
            `).join('');
            document.getElementById('colorName').innerText = cur.color;

            // Sizes
            const sizes = cur.name === 'Ultimate' ? ['XS','S','M','L','XL','XXL'] : ['S','M','L','XL'];
            document.getElementById('sizeOptions').innerHTML = sizes.map(s => `
                <button class="s-btn ${cur.size === s ? 'selected' : ''}" 
                        onclick="selectSize('${s}')">${s}</button>
            `).join('');
            
            document.getElementById('pQty').innerText = cur.qty;
        }

        function selectColor(n) { cur.color = n; renderSelectors(); }
        function selectSize(s) { cur.size = s; renderSelectors(); }
        function updateQty(v) { cur.qty = Math.max(1, cur.qty + v); renderSelectors(); }

        function addToBag() {
            bag.push({...cur});
            updateBag();
            togglePage('productPage');
            togglePage('cartPage');
        }

        function updateBag() {
            document.getElementById('cartCount').innerText = bag.length;
            const sub = bag.reduce((a, b) => a + (b.price * b.qty), 0);
            const tax = sub * 0.13;
            document.getElementById('subTotal').innerText = sub.toFixed(2);
            document.getElementById('taxTotal').innerText = tax.toFixed(2);
            document.getElementById('grandTotal').innerText = (sub + tax).toFixed(2);

            document.getElementById('bagItems').innerHTML = bag.map((item, i) => `
                <div style="display:flex; justify-content:space-between; padding:20px 0; border-bottom:1px solid #222;">
                    <div>
                        <b>Snack-Hoods ${item.name}</b><br>
                        <small style="color:var(--secondary-text)">${item.color} | Size ${item.size} | Qty ${item.qty}</small><br>
                        <span style="color:#ff3b30; cursor:pointer; font-size:0.7rem;" onclick="bag.splice(${i},1); updateBag()">Remove</span>
                    </div>
                    <span>$${(item.price * item.qty).toFixed(2)}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
