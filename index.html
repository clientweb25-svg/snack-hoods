<!DOCTYPE html>
<html>
<head>
<style>
  body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; }
  
  header { 
    border-bottom: 4px solid #0000FF; /* Electric Blue */
    padding: 40px; 
    text-align: center; 
  }

  .logo { color: #FF8C00; font-size: 50px; text-shadow: 2px 2px #0000FF; }

  .story-section {
    padding: 50px;
    background: linear-gradient(180deg, #000 0%, #000033 100%);
    text-align: center;
  }

  .buy-btn {
    background-color: #FF8C00; /* Orange */
    color: black;
    padding: 20px 40px;
    font-size: 20px;
    border: none;
    cursor: pointer;
    box-shadow: 0 0 15px #FF8C00;
  }

  .buy-btn:hover { background-color: #0000FF; color: white; box-shadow: 0 0 15px #0000FF; }
</style>
</head>
<body>

<header>
  <div class="logo">SNACK HODODS</div>
  <p>STAY HUNGRY. STAY LOUD.</p>
</header>

<section class="story-section">
  <h2>OUR STORY</h2>
  <p>Born in the dark. Fueled by flavor. The Hodod is the world's first aerodynamic snack.</p>
  <br>
  <button class="buy-btn">GET THE CRUNCH</button>
</section>

</body>
</html>
